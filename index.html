<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="theme-color"
      content="#0F172A"
    />
    <meta
      name="robots"
      content="index, follow"
    />
    <meta
      name="description"
      content="Aero Weather provides real-time weather forecasts, interactive charts, and live radar data."
    />
    <title>Aero Weather | Live Forecast</title>

    <!-- SEO Canonical & Open Graph -->
    <link
      rel="canonical"
      href="https://example.com/weather"
    />
    <meta
      property="og:title"
      content="Aero Weather | Live Forecast"
    />
    <meta
      property="og:description"
      content="Premium weather application featuring real-time data, forecasts, and interactive charts."
    />
    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:url"
      content="https://example.com/weather"
    />

    <!-- Preconnect and Resource Hints -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://openweathermap.org"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="https://openweathermap.org"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main></main>
    <script
      type="module"
      src="/src/main.js"
    ></script>
  </body>
</html>
